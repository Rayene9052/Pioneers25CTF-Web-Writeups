{% extends 'base.html' %}
{% block title %}Login — CipherNote{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🔐</span>
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access your vault</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" name="username" class="form-input"
                        placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                <span>Decrypt & Login</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have a vault? <a href="{{ url_for('register') }}">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
