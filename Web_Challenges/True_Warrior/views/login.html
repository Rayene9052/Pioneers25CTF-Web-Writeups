<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Northstar Admin Portal</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Northstar Admin Portal</h1>
          <div class="sub">Restricted access • internal use only</div>
        </div>
      </div>
      <span class="pill">v1.0</span>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Login</h2>
        <div class="small">Use your admin credentials to continue.</div>

        <form method="POST" action="/login" autocomplete="off">
          <label>Username</label>
          <input name="username" placeholder="admin" />

          <label>Password</label>
          <input name="password" type="password" placeholder="••••••••••" />

          <div class="row">
            <button class="btn" type="submit">Sign in</button>
            <a class="btn2" href="/health">Health</a>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Security Notice</h2>
        <div class="kv">
          This system is monitored. Unauthorized access is prohibited.<br><br>
          <b>Tip:</b> Show me what you got.
        </div>
        <hr />
        <div class="small">
          Having trouble? Contact your administrator.
        </div>
      </div>
    </div>
  </div>
</body>
</html>
