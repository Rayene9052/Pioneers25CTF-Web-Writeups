<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SnippetVault</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:monospace;background:#0d1117;color:#c9d1d9;max-width:960px;margin:0 auto;padding:24px}
    a{color:#58a6ff;text-decoration:none} a:hover{text-decoration:underline}
    input,textarea,select{background:#161b22;color:#c9d1d9;border:1px solid #30363d;padding:6px 10px;width:100%;margin-top:4px}
    input[type=submit],button{background:#238636;color:#fff;border:none;padding:8px 18px;cursor:pointer;width:auto}
    input[type=checkbox]{width:auto}
    .box{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:18px;margin:14px 0}
    .err{color:#f85149} .ok{color:#3fb950} .warn{color:#d29922}
    nav{margin-bottom:16px} nav a{margin-right:14px}
    pre{background:#010409;padding:14px;overflow-x:auto;border-radius:4px}
    table{border-collapse:collapse;width:100%}
    td,th{border:1px solid #30363d;padding:6px 10px;text-align:left}
    h2{border-bottom:1px solid #30363d;padding-bottom:6px}
    .muted{color:#8b949e;font-size:0.85em}
  </style>
</head>
<body>
  <nav>
    <b>SnippetVault</b> &nbsp;|&nbsp;
    {% if session.get('user_id') %}
      <a href="/snippets">Snippets</a>
      <a href="/explore">Explore</a>
      <a href="/upload">Upload</a>
      <a href="/profile">Profile</a>
      {% if session.get('role') == 'admin' %}
        <a href="/admin">Admin &#9654;</a>
      {% endif %}
      <a href="/logout">Logout ({{ session.get('username', '') }})</a>
    {% else %}
      <a href="/login">Login</a>
      <a href="/register">Register</a>
    {% endif %}
  </nav>
  <hr style="border-color:#30363d">
  {% block content %}{% endblock %}
</body>
</html>
