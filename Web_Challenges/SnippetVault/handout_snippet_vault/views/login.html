{% extends "base.html" %}
{% block content %}
<h2>Login</h2>
<div class="box">
  <form method="post">
    <label>Username<br><input name="username"></label><br><br>
    <label>Password<br><input name="password" type="password"></label><br><br>
    <input type="submit" value="Login">
  </form>
  {% if msg %}<p class="err">{{ msg }}</p>{% endif %}
</div>
{% endblock %}
