{% extends "base.html" %}
{% block content %}
<h2>Register</h2>
<div class="box">
  <form method="post">
    <label>Username<br><input name="username" autocomplete="off"></label><br><br>
    <label>Password<br><input name="password" type="password"></label><br><br>
    <input type="submit" value="Create Account">
  </form>
  {% if msg %}<p class="{{ cls }}">{{ msg }}</p>{% endif %}
</div>
{% endblock %}
