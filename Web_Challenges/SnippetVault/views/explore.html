{% extends "base.html" %}
{% block content %}
<h2>Explore Public Snippets</h2>
<div class="box">
  <form method="get">
    <input name="q" placeholder="Search by title&hellip;" value="{{ q }}"
           style="width:70%;display:inline">
    <input type="submit" value="Search">
  </form>
</div>
<div class="box">
  <table>
    <tr><th>ID</th><th>Title</th><th>Lang</th><th>Author</th><th>Date</th></tr>
    {% if rows %}
      {% for r in rows %}
      <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.title }}</td>
        <td>{{ r.lang }}</td>
        <td>{{ r.username }}</td>
        <td>{{ r.created_at }}</td>
      </tr>
      {% endfor %}
    {% else %}
      <tr><td colspan="5">No public snippets found.</td></tr>
    {% endif %}
  </table>
</div>
{% endblock %}
